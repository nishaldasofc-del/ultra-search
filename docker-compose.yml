version: "3.9"

services:

  # ── API Server ──────────────────────────────────────────
  api:
    build: .
    command: uvicorn app:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - postgres
      - redis
    volumes:
      - .:/app
    restart: unless-stopped

  # ── Crawler Worker ──────────────────────────────────────
  crawler-worker:
    build: .
    command: celery -A workers.tasks worker -Q crawl -c 4 --loglevel=info
    env_file: .env
    depends_on:
      - redis
      - postgres
    restart: unless-stopped

  # ── Research Worker ─────────────────────────────────────
  research-worker:
    build: .
    command: celery -A workers.tasks worker -Q research -c 2 --loglevel=info
    env_file: .env
    depends_on:
      - redis
    restart: unless-stopped

  # ── PostgreSQL ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ultrasearch
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

  # ── Redis ───────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  # ── Flower (Celery monitor) ─────────────────────────────
  flower:
    build: .
    command: celery -A workers.tasks flower --port=5555
    ports:
      - "5555:5555"
    env_file: .env
    depends_on:
      - redis
    restart: unless-stopped

volumes:
  postgres_data:
